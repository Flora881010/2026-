<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preload" as="image" href="cover.png" />
<link rel="preload" as="image" href="grass-map.png" />
<title>冒險地圖活動</title>

<style>
:root{
  --gold:#f7d56a;
  --gold-2:#fff2b7;
  --dark:#11170f;
  --panel:#f4dfac;
  --brown:#5b3514;
  --green:#526f34;
  --danger:#b12c1d;
  --cyan:#00eaff;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:"Microsoft JhengHei",system-ui,sans-serif;
  user-select:none;
}

.hidden{display:none!important}

.page{
  position:fixed;
  inset:0;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  background:#000;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
  -webkit-tap-highlight-color:transparent;
}

/* 共用：淡入切頁 */
.page:not(.hidden){
  animation:pageIn .45s ease both;
}

/* 背景粒子 */
.particles{
  pointer-events:none;
  position:absolute;
  inset:0;
  z-index:3;
  overflow:hidden;
}

.particles i{
  position:absolute;
  bottom:-24px;
  width:6px;
  height:6px;
  border-radius:999px;
  background:rgba(255,231,129,.75);
  box-shadow:0 0 16px rgba(255,231,129,.9);
  animation:floatUp linear infinite;
}

/* 首頁 */
#landing .full-img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  background:#000;
  filter:saturate(1.05) contrast(1.03);
}

.landing-vignette{
  pointer-events:none;
  position:absolute;
  inset:0;
  z-index:2;
  background:
    radial-gradient(circle at 50% 45%, transparent 35%, rgba(0,0,0,.35) 72%, rgba(0,0,0,.82) 100%);
}

.start-btn{
  position:absolute;
  left:50%;
  bottom:8%;
  z-index:20;
  transform:translateX(-50%);
  padding:16px 54px 18px;
  font-size:28px;
  font-weight:900;
  letter-spacing:5px;
  color:#fff6c9;
  background:linear-gradient(180deg,#d49d3e 0%,#6f5226 100%);
  border:3px solid #ffe59a;
  border-radius:999px;
  text-shadow:0 3px 0 #000;
  box-shadow:0 0 18px rgba(255,220,120,.55),0 12px 0 #3e2b13,0 18px 32px rgba(0,0,0,.62);
  animation:magicGlow 1.7s infinite, startBounce 2.4s ease-in-out infinite;
}

.start-btn::after{
  content:"點擊進入地圖";
  position:absolute;
  left:50%;
  top:calc(100% + 16px);
  transform:translateX(-50%);
  width:max-content;
  font-size:14px;
  letter-spacing:2px;
  color:rgba(255,255,255,.86);
  text-shadow:0 2px 6px #000;
}

.start-btn:hover{filter:brightness(1.08)}
.start-btn:active{transform:translateX(-50%) translateY(8px);box-shadow:0 0 12px rgba(255,220,120,.55),0 5px 0 #3e2b13,0 12px 24px rgba(0,0,0,.62)}

/* HUD */
.hud{
  position:absolute;
  left:7%;
  top:4.8%;
  z-index:70;
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 16px;
  color:#fff8da;
  background:rgba(17,28,20,.88);
  border:3px solid rgba(247,213,106,.9);
  border-radius:20px;
  box-shadow:0 10px 24px rgba(0,0,0,.45), inset 0 0 18px rgba(255,220,120,.12);
  text-shadow:0 2px 0 #000;
}

.avatar{
  width:48px;
  height:48px;
  display:grid;
  place-items:center;
  border-radius:16px;
  background:linear-gradient(180deg,#ffe99f,#aa7426);
  border:2px solid #fff0b6;
  font-size:28px;
  box-shadow:0 0 18px rgba(255,220,120,.45);
}

.hud-title{font-size:14px;font-weight:900;opacity:.86}
.hud-level{margin-top:2px;font-size:22px;font-weight:900;letter-spacing:1px}

.progress-shell{
  width:180px;
  height:12px;
  margin-top:8px;
  border-radius:999px;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.2);
  overflow:hidden;
}

.progress-fill{
  width:42%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#78ff85,#f7d56a);
  box-shadow:0 0 12px rgba(120,255,133,.8);
}

.countdown-box{
  position:absolute;
  right:7%;
  top:4.8%;
  z-index:70;
  padding:12px 20px;
  text-align:center;
  color:#fff6c9;
  background:rgba(25,40,34,.9);
  border:3px solid #d7c57a;
  border-radius:18px;
  box-shadow:0 0 16px rgba(0,0,0,.45),0 8px 18px rgba(0,0,0,.45);
  text-shadow:0 2px 0 #000;
}

.countdown-title{font-size:16px;font-weight:900;margin-bottom:6px}
#countdown{font-size:24px;font-weight:900}

/* 地圖 */
.map-wrap{
  position:relative;
  width:100vw;
  height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:radial-gradient(circle at 50% 45%,#22331f,#050705 70%);
}

.map-stage{
  position:relative;
  width:min(100vw, calc(100dvh * 2));
  height:min(100dvh, calc(100vw / 2));
  aspect-ratio:2 / 1;
  animation:mapEnter .7s cubic-bezier(.2,1,.25,1) both;
}

.map-img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:saturate(1.08) contrast(1.04) drop-shadow(0 22px 32px rgba(0,0,0,.55));
}

.map-path{
  pointer-events:none;
  position:absolute;
  left:28%;
  top:51%;
  width:19%;
  height:17%;
  border-top:5px dashed rgba(255,235,150,.72);
  border-radius:50%;
  transform:rotate(18deg);
  filter:drop-shadow(0 0 8px rgba(255,220,120,.75));
  animation:pathPulse 1.6s infinite alternate;
}

.hotspot,
.map-label{
  position:absolute;
  z-index:10;
  background:transparent;
  transform:translate(-50%,-50%);
}

.hotspot::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:46%;
  height:46%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,245,255,1),rgba(0,180,255,.45),transparent 72%);
  box-shadow:0 0 18px rgba(0,245,255,.85),0 0 42px rgba(0,180,255,.6);
  animation:glow 1.4s infinite alternate;
}

.hotspot::after{
  content:"!";
  position:absolute;
  left:50%;
  top:-12px;
  width:28px;
  height:28px;
  transform:translateX(-50%);
  display:grid;
  place-items:center;
  border-radius:999px;
  color:#3d2608;
  background:linear-gradient(180deg,#fff7bc,#f7c84f);
  border:2px solid #fff2b7;
  font-weight:900;
  box-shadow:0 0 18px rgba(255,220,120,.8);
  animation:noticeJump 1.2s ease-in-out infinite;
}

.hotspot span,
.map-label{
  position:absolute;
  left:50%;
  top:82%;
  width:190px;
  transform:translateX(-50%);
  text-align:center;
  white-space:nowrap;
  color:#fff;
  text-shadow:0 3px 0 #000,0 0 8px rgba(255,255,255,.35),0 4px 10px rgba(0,0,0,.8);
}

.map-name{display:block;font-size:20px;font-weight:900}
.map-date{display:block;margin-top:6px;font-size:15px;font-weight:900;font-style:normal}

.hotspot:hover{z-index:40}
.hotspot:hover::before{background:radial-gradient(circle,rgba(255,241,120,1),rgba(255,150,0,.55),transparent 72%);box-shadow:0 0 24px rgba(255,231,129,.95),0 0 54px rgba(255,150,0,.75)}
.hotspot:hover span{transform:translateX(-50%) translateY(-6px)}

.grass{left:25%;top:48%;width:130px;height:130px}
.second{left:47%;top:68%;width:130px;height:130px}

.mother-event{left:36.8%;top:49%;width:60px;height:60px;z-index:10;filter:grayscale(.35) brightness(.95);opacity:.88}
.grass-event{left:29.8%;top:65%;width:60px;height:60px;z-index:15}

.mother-event::after,
.grass-event::after{content:""}

.mother-event::before,
.grass-event::before{
  content:"";
  position:absolute;
  left:50%;
  top:20%;
  width:5px;
  height:40px;
  transform:translateX(-50%);
  background:linear-gradient(180deg,#6a5134,#2c1e10);
  border-radius:4px;
  animation:none;
  box-shadow:none;
}

.mother-event .flag,
.grass-event .flag{
  position:absolute;
  left:50%;
  top:18%;
  width:34px;
  height:20px;
  transform:translateX(2px);
  clip-path:polygon(0 0,100% 0,80% 50%,100% 100%,0 100%);
  animation:flagWave 1.2s ease-in-out infinite;
}

.mother-event .flag{background:linear-gradient(135deg,#ff7272,#b51f1f)}
.grass-event .flag{background:linear-gradient(135deg,#7cff72,#1f8b2c)}

.mother-event span,.grass-event span{top:92%;width:180px}
.mother-event span{
  width:140px;

  padding:0;

  color:#fff4dc;

  background:transparent;
  border:none;
  border-radius:0;
  box-shadow:none;

  text-shadow:
    0 2px 0 #000,
    0 0 6px rgba(255,255,255,.35),
    0 3px 8px rgba(0,0,0,.95);
}
.mother-event span::before{
  content:"已結束";
  display:inline-block;
  margin-bottom:3px;
  padding:2px 8px;
  border-radius:999px;
  color:#fff8e8;
  background:rgba(60,52,42,.72);
  border:1px solid rgba(255,240,200,.55);
  font-size:10px;
  font-weight:900;
  letter-spacing:1px;
  transform:rotate(-5deg);
  box-shadow:
    0 2px 6px rgba(0,0,0,.35);
}
.mother-event::after{
  content:"✓";
  position:absolute;
  right:-8px;
  top:-8px;
  width:26px;
  height:26px;
  display:grid;
  place-items:center;
  border-radius:999px;
  color:#2f2f2f;
  background:linear-gradient(180deg,#eeeeee,#999999);
  border:2px solid #f4f4f4;
  font-size:16px;
  font-weight:900;
  box-shadow:0 0 12px rgba(255,255,255,.35),0 5px 10px rgba(0,0,0,.45);
}
.mother-event:hover::before{box-shadow:none}
.mother-event:hover span{transform:translateX(-50%)}
.grass-event span{color:#7cff72}
.mother-event .map-name,.grass-event .map-name{font-size:15px}
.mother-event .map-name{color:#fff2d2;letter-spacing:1px}
.mother-event .map-date{color:#fff7e8}
.mother-event .map-date,.grass-event .map-date{font-size:10px}

.map-label{
  z-index:12;
  color:#111;
  text-shadow:0 1px 0 rgba(255,255,255,.6),0 2px 4px rgba(255,255,255,.35);
  opacity:.72;
  cursor:not-allowed;
}
.third-label{left:70%;top:40%}
.third-label::before{
  content:"🔒";
  display:block;
  font-size:28px;
  margin-bottom:4px;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));
}

.back-btn,.close-btn{
  padding:12px 32px;
  font-size:22px;
  font-weight:900;
  letter-spacing:3px;
  color:#fff8da;
  background:linear-gradient(180deg,#7f9443 0%,#415425 100%);
  border:3px solid #d7c57a;
  border-radius:999px;
  box-shadow:0 0 16px rgba(255,220,120,.35),0 8px 0 #263318,0 14px 24px rgba(0,0,0,.45);
  text-shadow:0 2px 0 #000;
}

.back-btn{position:absolute;left:50%;bottom:4%;transform:translateX(-50%);z-index:80}
.close-btn{margin-top:30px}
.back-btn:active,.close-btn:active{transform:translateX(-50%) translateY(5px);box-shadow:0 0 12px rgba(255,220,120,.3),0 3px 0 #263318,0 8px 18px rgba(0,0,0,.4)}
.close-btn:active{transform:translateY(5px)}

/* 任務頁 */
.quest-bg{position:fixed;inset:0;background:#000}
.quest-bg img{width:100%;height:100%;object-fit:cover;opacity:.55;filter:brightness(.62) blur(1px) saturate(1.05)}
.quest-bg::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 38%,rgba(0,0,0,.05),rgba(0,0,0,.75) 82%)}

.quest-menu{
  position:absolute;
  left:50%;
  top:50%;
  width:min(980px,88vw);
  transform:translate(-50%,-50%);
  text-align:center;
}

.quest-menu h1{
  margin:0 0 22px;
  font-size:clamp(34px,5vw,56px);
  letter-spacing:8px;
  color:#fff;
  text-shadow:0 4px 0 #4b2a10,0 8px 18px rgba(0,0,0,.75);
}

.quest-subtitle{
  margin:0 auto 28px;
  width:max-content;
  max-width:90%;
  padding:8px 18px;
  color:#fff3b9;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,230,160,.45);
  border-radius:999px;
  font-size:18px;
  font-weight:900;
  letter-spacing:2px;
}

.quest-options{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
}

.quest-option{
  position:relative;
  overflow:hidden;
  min-height:210px;
  padding:26px 18px;
  background:linear-gradient(180deg,rgba(255,240,205,.98) 0%,rgba(246,225,175,.96) 45%,rgba(226,197,125,.96) 100%);
  border:4px double #3a230c;
  border-radius:24px;
  box-shadow:0 16px 36px rgba(0,0,0,.55),inset 0 0 28px rgba(116,71,22,.25);
  font-size:28px;
  font-weight:900;
  line-height:1.35;
  color:#6f1d1d;
  transition:transform .22s ease,box-shadow .22s ease,filter .22s ease;
  transform-origin:center;
}

.quest-option .icon{display:block;font-size:44px;margin-bottom:14px;filter:drop-shadow(0 4px 0 rgba(0,0,0,.18))}
.quest-option .difficulty{display:block;margin-top:12px;font-size:14px;color:#5f3a13;letter-spacing:1px}

.quest-option::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.35) 50%,transparent 80%);
  opacity:0;
  transform:translateX(-120%);
  transition:all .45s ease;
}

.quest-option:hover{
  transform:scale(1.08) translateY(-6px);
  box-shadow:0 24px 52px rgba(0,0,0,.7),0 0 28px rgba(255,220,120,.85),inset 0 0 36px rgba(116,71,22,.32);
  filter:brightness(1.08);
}
.quest-option:hover::before{opacity:1;transform:translateX(120%)}
.quest-option:active{transform:scale(1.03) translateY(-2px)}

/* 任務卡 */
.task-card{
  position:absolute;
  left:50%;
  top:50%;
  width:min(900px,86vw);
  max-height:82dvh;
  overflow-y:auto;
  transform:translate(-50%,-50%);
  padding:64px 56px 44px;
  text-align:center;
  background:linear-gradient(180deg,rgba(248,235,197,.99),rgba(241,223,177,.99));
  border:4px solid #7c5a2d;
  border-radius:28px;
  box-shadow:0 20px 48px rgba(0,0,0,.55),inset 0 0 24px rgba(140,100,40,.18);
  animation:cardPop .36s cubic-bezier(.2,1.2,.3,1) both;
}

.task-card::before{
  content:"任務卷軸";
  position:absolute;
  left:50%;
  top:18px;
  transform:translateX(-50%);
  padding:6px 18px;
  border-radius:999px;
  background:#6d4421;
  color:#ffe6a0;
  font-size:15px;
  font-weight:900;
  letter-spacing:3px;
}

.task-card h1{margin:0 0 26px;font-size:clamp(36px,5.4vw,60px);letter-spacing:5px;color:#496f34}
.task-card p,.task-card li{font-size:clamp(22px,3vw,32px);font-weight:900;line-height:1.8;color:#1d1207}
.task-card ul{list-style:none;padding:0;margin:0}
.task-card li::before{content:"✓ ";color:#496f34}

.reward{
  margin:30px auto 0;
  padding:20px 34px;
  width:fit-content;
  max-width:100%;
  font-size:clamp(22px,3.2vw,34px);
  font-weight:900;
  color:#6a3911;
  background:linear-gradient(180deg,#fff2b7,#e3c96d);
  border:3px solid #8b601f;
  border-radius:999px;
  box-shadow:0 10px 24px rgba(0,0,0,.2), inset 0 0 16px rgba(255,255,255,.35);
}
.reward strong{color:#b12c1d}

/* 部室加碼獎：部門人數對應達標率表格 */
.rate-table{
  width:min(560px,100%);
  margin:24px auto 30px;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.18), inset 0 0 12px rgba(255,255,255,.25);
}

.rate-table thead th{
  background:#7b4b2d;
  color:#fff7dc;
  padding:18px 14px;
  font-size:clamp(19px,2.5vw,24px);
  border:2px solid rgba(255,255,255,.45);
  letter-spacing:2px;
}

.rate-table tbody td{
  padding:18px 14px;
  text-align:center;
  font-size:clamp(21px,3vw,26px);
  font-weight:900;
  color:#1f140b;
  background:rgba(255,250,241,.96);
  border:2px solid rgba(91,53,20,.12);
}

.rate-table tbody tr:nth-child(even) td{background:#f7ecd0}
.rate-table tbody td:last-child{color:#b12c1d}

.department-note{
  margin:12px auto 0;
  max-width:680px;
  font-size:clamp(18px,2.2vw,22px)!important;
  line-height:1.7!important;
  color:#7a4a1f!important;
}


/* 聯盟挑戰賽：兩段式任務面板 */
.alliance-board{
  width:min(780px,100%);
  margin:18px auto 0;
  display:grid;
  gap:16px;
  text-align:left;
}

.alliance-hero{
  position:relative;
  overflow:hidden;
  padding:22px 26px;
  border-radius:28px;
  color:#fff8da;
  background:
    radial-gradient(circle at 88% 20%,rgba(255,229,130,.36),transparent 30%),
    linear-gradient(135deg,#6f4325 0%,#2f1b0d 100%);
  border:3px solid #e7c66f;
  box-shadow:0 16px 34px rgba(0,0,0,.28), inset 0 0 28px rgba(255,220,120,.12);
}

.alliance-hero::after{
  content:"";
  position:absolute;
  right:-26px;
  bottom:-42px;
  width:160px;
  height:160px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
}

.alliance-kicker{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.28);
  border:1px solid rgba(255,232,150,.35);
  color:#ffe88c;
  font-size:16px;
  font-weight:900;
  letter-spacing:1px;
}

.alliance-hero h2{
  position:relative;
  z-index:1;
  margin:0;
  color:#fff7dc;
  font-size:clamp(30px,4.2vw,48px);
  line-height:1.12;
  letter-spacing:3px;
  text-shadow:0 3px 0 rgba(0,0,0,.55);
}

.alliance-hero h2 strong{
  color:#ffe88c;
  font-size:1.12em;
}

.alliance-mini-note{
  position:relative;
  z-index:1;
  margin-top:10px;
  color:rgba(255,248,218,.9);
  font-size:clamp(16px,2vw,20px)!important;
  line-height:1.45!important;
}

.alliance-result-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.alliance-status-card{
  position:relative;
  overflow:hidden;
  padding:0;
  border-radius:26px;
  background:linear-gradient(180deg,rgba(255,250,232,.98),rgba(239,216,164,.97));
  border:3px solid rgba(123,75,45,.65);
  box-shadow:0 12px 26px rgba(0,0,0,.18), inset 0 0 18px rgba(128,80,28,.12);
}

.alliance-status-card.success{
  border-color:#8a8f3c;
}

.alliance-status-card.fail{
  background:linear-gradient(180deg,#fff2eb,#e8c3a9);
  border-color:#b65b35;
}

.alliance-status-head{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px 18px;
  color:#fff7dc;
  background:linear-gradient(180deg,#8f5a2f,#553013);
  border-bottom:2px solid rgba(255,230,160,.45);
}

.alliance-status-card.success .alliance-status-head{
  background:linear-gradient(180deg,#71803b,#3e4f24);
}

.alliance-status-card.fail .alliance-status-head{
  background:linear-gradient(180deg,#a85835,#6d2d1e);
}

.alliance-status-icon{
  width:46px;
  height:46px;
  display:grid;
  place-items:center;
  flex:0 0 auto;
  border-radius:16px;
  background:rgba(0,0,0,.18);
  border:2px solid rgba(255,232,150,.55);
  font-size:27px;
  box-shadow:inset 0 0 12px rgba(255,255,255,.08);
}

.alliance-status-title{
  font-size:clamp(24px,3vw,32px);
  font-weight:900;
  letter-spacing:2px;
  text-shadow:0 2px 0 rgba(0,0,0,.45);
}

.alliance-status-sub{
  margin-top:3px;
  font-size:clamp(14px,1.7vw,17px);

function initParticles(targetId,count=28){
  const box=document.getElementById(targetId);
  if(!box) return;
  box.innerHTML="";
  for(let i=0;i<count;i++){
    const p=document.createElement("i");
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(5+Math.random()*7)+"s";
    p.style.animationDelay=(-Math.random()*8)+"s";
    p.style.opacity=.3+Math.random()*.7;
    p.style.transform=`scale(${.7+Math.random()*1.4})`;
    box.appendChild(p);
  }
}

function unlockAudio(){
  if(audioReady) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  audioReady=true;
}

function sfx(type="click"){
  if(!audioReady || !audioCtx) return;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const now=audioCtx.currentTime;
  const tones={click:520,open:720,back:330,reward:880,error:180};
  osc.frequency.setValueAtTime(tones[type]||520,now);
  if(type==="reward") osc.frequency.exponentialRampToValueAtTime(1320,now+.12);
  if(type==="error") osc.frequency.exponentialRampToValueAtTime(120,now+.16);
  gain.gain.setValueAtTime(.0001,now);
  gain.gain.exponentialRampToValueAtTime(.08,now+.015);
  gain.gain.exponentialRampToValueAtTime(.0001,now+.16);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now+.18);
}

document.addEventListener("pointerdown",unlockAudio,{once:true});

function showReportPlaceholder(text){
  const departmentReportStack=document.getElementById("departmentReportStack");
  const singleReportWrap=document.getElementById("singleReportWrap");
  departmentReportStack.classList.add("hidden");
  singleReportWrap.classList.add("hidden");
  reportEmpty.classList.remove("hidden");
  reportEmpty.innerHTML=text;
}

function switchReport(key){
  const map=getReportMap(currentReportMapKey);
  const item=map.reports.find(report=>report.key===key) || map.reports[0];
  currentReportKey=item.key;
  reportDisplayTitle.textContent=`${map.title}｜${item.title}`;

  const departmentReportStack=document.getElementById("departmentReportStack");
  const singleReportWrap=document.getElementById("singleReportWrap");

  reportEmpty.classList.add("hidden");
  reportEmpty.innerHTML=`
    戰報尚未更新。
  `;

  if(item.type==="department"){
    departmentReportStack.classList.remove("hidden");
    singleReportWrap.classList.add("hidden");
    departmentReportStack.innerHTML=(item.paths || []).map((path,index)=>`
      <div class="report-shot"><img src="${path}?v=${Date.now()}" alt="${map.title} ${item.title} ${index+1}" onerror="this.closest('.report-shot').classList.add('missing')"></div>
    `).join("");
    const missingPath=document.getElementById("reportMissingPath");
    if(missingPath) missingPath.textContent=(item.paths || []).join("、");
  }else{
    departmentReportStack.classList.add("hidden");
    singleReportWrap.classList.remove("hidden");
    reportImage.style.display="block";
    reportImage.alt=`${map.title} ${item.title}`;
    const missingPath=document.getElementById("reportMissingPath");
    if(missingPath) missingPath.textContent=item.src;
    reportImage.src=item.src + "?v=" + Date.now();
  }

  renderReportTypeTabs();
}

function toNumber(value){
  if(value===undefined || value===null || value==="") return 0;
  const n=Number(String(value).replace(/,/g,"").trim());
  return Number.isFinite(n) ? n : 0;
}

function formatMoney(value){
  return Number(value || 0).toLocaleString("zh-TW");
}

async function loadRewardExcel(){
  if(rewardData.length>0) return rewardData;
  if(rewardLoadPromise) return rewardLoadPromise;

  rewardLoadPromise=fetch(REWARD_EXCEL_PATH,{cache:"no-store"})
    .then(response=>{
      if(!response.ok) throw new Error("Excel 檔案讀取失敗");
      return response.arrayBuffer();
    })
    .then(arrayBuffer=>{
      const workbook=XLSX.read(arrayBuffer,{type:"array"});
      const sheet=workbook.Sheets[workbook.SheetNames[0]];
      rewardData=XLSX.utils.sheet_to_json(sheet,{defval:""});
      return rewardData;
    })
    .catch(error=>{
      rewardLoadPromise=null;
      throw error;
    });

  return rewardLoadPromise;
}

async function openRewardSearch(){
  rewardBackdrop.classList.remove("hidden");
  rewardModal.classList.remove("hidden");
  rewardResult.innerHTML="資料載入中...";

  try{
    await loadRewardExcel();
    rewardResult.innerHTML=`請輸入姓名或集團員編查詢目前累積的獎勵。`;
    setTimeout(()=>rewardKeywordInput.focus(),120);
    showToast("獎勵查詢已開啟","open");
  }catch(error){
    rewardResult.innerHTML=`無法讀取 <strong>${REWARD_EXCEL_PATH}</strong><br>請確認 Excel 檔名、路徑正確，且網頁是用 Live Server / 本機伺服器開啟。`;
    sfx("error");
  }
}

function closeRewardSearch(){
  rewardModal.classList.add("hidden");
  rewardBackdrop.classList.add("hidden");
  sfx("back");
}

function getRowKey(row,key){
  return String(row[key] ?? "").trim();
}

function findRewardRow(keyword){
  const target=String(keyword || "").trim();
  if(!target) return null;

  return rewardData.find(row=>{
    const empId=getRowKey(row,"集團員編");
    const name=getRowKey(row,"姓名");
    return empId===target || name===target;
  });
}

async function searchReward(){
  const keyword=rewardKeywordInput.value.trim();

  if(!keyword){
    rewardResult.innerHTML="請先輸入姓名或集團員編。";
    sfx("error");
    return;
  }

  try{
    await loadRewardExcel();
  }catch(error){
    rewardResult.innerHTML=`無法讀取 <strong>${REWARD_EXCEL_PATH}</strong><br>請確認 Excel 檔名、路徑正確。`;
    sfx("error");
    return;
  }

  const row=findRewardRow(keyword);

  if(!row){
    rewardResult.innerHTML=`查無「${keyword}」，請確認姓名或集團員編是否輸入正確。`;
    sfx("error");
    return;
  }

  let total=0;
  const detailRows=rewardColumns.map(col=>{
    const value=toNumber(row[col]);
    total+=value;
    return `<tr><td>${col}</td><td>${formatMoney(value)} 元</td></tr>`;
  }).join("");

  rewardResult.innerHTML=`
    <div>姓名：<strong>${row["姓名"] || "-"}</strong></div>
    ${row["集團員編"] ? `<div>集團員編：<strong>${row["集團員編"]}</strong></div>` : ""}
    <div>總步數：${formatMoney(toNumber(row["總步數"]))}</div>
    <div>有步數天數：${formatMoney(toNumber(row["有步數天數"]))}</div>
    <table class="reward-detail-table">${detailRows}</table>
    <div class="reward-total">目前累積獎勵金：<strong>${formatMoney(total)}</strong> 元</div>
  `;

  sfx("reward");
}

const eventEndTime=new Date("2026-05-21T23:59:59+08:00").getTime();
function updateCountdown(){
  const now=Date.now();
  const distance=eventEndTime-now;
  if(distance<=0){
    countdown.textContent="活動已結束";
    return;
  }
  const days=Math.floor(distance/(1000*60*60*24));
  const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
  const seconds=Math.floor((distance%(1000*60))/1000);
  countdown.textContent=`${days}天 ${hours}時 ${minutes}分 ${seconds}秒`;
}
setInterval(updateCountdown,1000);
updateCountdown();
</script>
